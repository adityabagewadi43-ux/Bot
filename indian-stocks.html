<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indian Stocks</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Share Tech Mono', monospace;
  background: #040608;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
#tradingCanvas {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:0;
  opacity:0.85;
}

.scanline-overlay {
  position: fixed;
  width:100%; height:100%;
  z-index:1;
  pointer-events:none;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

.vignette {
  position: fixed;
  width:100%; height:100%;
  z-index:2;
  pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(4,6,8,0.7) 100%);
}

/* UI */
.container {
  position: relative;
  z-index: 10;
  max-width: 1200px;
  margin: auto;
  padding: 60px 40px;
}

.header {
  text-align:center;
  margin-bottom:40px;
}

.header h1 {
  font-family:'Orbitron';
  font-size:2.5rem;
  text-shadow:0 0 40px rgba(0,220,150,0.6);
}

.back-btn {
  position:fixed;
  top:20px;
  left:20px;
  z-index:20;
  background:rgba(0,220,150,0.15);
  border:1px solid rgba(0,220,150,0.4);
  color:#00dc96;
  padding:10px 16px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:rgba(8,16,24,0.75);
  backdrop-filter:blur(16px);
  border:1px solid rgba(0,220,150,0.15);
  padding:24px;
  border-radius:6px;
  transition:0.25s;
}

.card:hover {
  transform:translateY(-4px);
  border-color:rgba(0,220,150,0.45);
  box-shadow:0 0 30px rgba(0,220,150,0.1);
}

.card h2 {
  font-family:'Orbitron';
  font-size:0.9rem;
}

.value {
  font-size:1.6rem;
  font-weight:bold;
}

.positive { color:#00dc96; }
.negative { color:#ff5c5c; }

.section { margin-top:40px; }

</style>
</head>

<body>

<canvas id="tradingCanvas"></canvas>
<div class="scanline-overlay"></div>
<div class="vignette"></div>

<button class="back-btn" onclick="goHome()">⬅ Home</button>

<div class="container">

<div class="header">
  <h1>📊 Indian Stock Dashboard</h1>
</div>

<div class="grid">
  <div class="card"><h2>NIFTY 50</h2><div class="value positive">22,847</div></div>
  <div class="card"><h2>SENSEX</h2><div class="value positive">75,320</div></div>
  <div class="card"><h2>BANK NIFTY</h2><div class="value negative">48,210</div></div>
  <div class="card"><h2>MARKET STATUS</h2><div class="value">OPEN</div></div>
</div>

<div class="section">
  <h2>🚀 Top Gainers</h2>
  <div class="grid">
    <div class="card"><h2>RELIANCE</h2><div class="value positive">+2.3%</div></div>
    <div class="card"><h2>TCS</h2><div class="value positive">+1.8%</div></div>
    <div class="card"><h2>INFY</h2><div class="value positive">+1.5%</div></div>
  </div>
</div>

<div class="section">
  <h2>📉 Top Losers</h2>
  <div class="grid">
    <div class="card"><h2>HDFC</h2><div class="value negative">-1.2%</div></div>
    <div class="card"><h2>ICICI</h2><div class="value negative">-0.9%</div></div>
    <div class="card"><h2>AXIS</h2><div class="value negative">-0.7%</div></div>
  </div>
</div>

</div>

<script>

/* ===== FULL ENGINE ===== */

const canvas = document.getElementById('tradingCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* GRID */
function drawGrid(){
  ctx.strokeStyle='rgba(0,220,150,0.04)';
  for(let x=0;x<canvas.width;x+=60){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=60){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();
  }
}

/* MATRIX */
const columns = Array.from({length:80},(_,i)=>({
  x:i*20,y:Math.random()*-500,speed:0.5+Math.random()
}));

function drawMatrix(){
  ctx.fillStyle='rgba(0,220,150,0.15)';
  columns.forEach(c=>{
    ctx.fillText(Math.random()>0.5?'1':'0',c.x,c.y);
    c.y+=c.speed;
    if(c.y>canvas.height)c.y=0;
  });
}

/* CANDLE CHART */
class Candle{
  constructor(x,y){
    this.x=x;this.y=y;
    this.height=Math.random()*40;
    this.dir=Math.random()>0.5;
  }
  draw(){
    ctx.fillStyle=this.dir?'rgba(0,220,150,0.3)':'rgba(255,92,92,0.3)';
    ctx.fillRect(this.x,this.y,this.dir?6:-6,this.height);
  }
}

let candles=Array.from({length:50},(_,i)=>new Candle(i*15,200));

function drawCandles(){
  candles.forEach(c=>{
    c.y+=Math.random()-0.5;
    c.draw();
  });
}

/* TICKERS */
const tickers=Array.from({length:10},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  vx:(Math.random()-0.5)*0.5
}));

function drawTickers(){
  ctx.fillStyle='rgba(255,255,255,0.2)';
  tickers.forEach(t=>{
    t.x+=t.vx;
    ctx.fillText("NIFTY",t.x,t.y);
  });
}

/* PULSES */
const pulses=Array.from({length:5},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  r:0
}));

function drawPulses(){
  pulses.forEach(p=>{
    p.r+=0.5;
    if(p.r>100)p.r=0;
    ctx.strokeStyle='rgba(0,220,150,0.1)';
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.stroke();
  });
}

/* LOOP */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  drawMatrix();
  drawCandles();
  drawTickers();
  drawPulses();
  requestAnimationFrame(draw);
}
draw();

function goHome(){
  window.location.href="home.html";
}

</script>

</body>
</html>
