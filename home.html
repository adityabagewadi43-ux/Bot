<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Trading </title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #09090b;
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 40px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: #18181b;
    padding: 20px;
    border-radius: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.positive { color: #34d399; }
.negative { color: #f87171; }

.icon {
    font-size: 40px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Trdaing market</h1>
    <p>Explore global markets</p>

    <div class="grid">

        <div class="card">
            <div class="icon">₿</div>
            <h2>Crypto</h2>
            <p>Bitcoin, Ethereum</p>
            <p class="positive">+2.45%</p>
        </div>

        <div class="card">
            <div class="icon">🇮🇳</div>
            <h2>Indian Stocks</h2>
            <p>Nifty 50, Sensex</p>
            <p class="positive">+0.87%</p>
        </div>

        <div class="card">
            <div class="icon">🇺🇸</div>
            <h2>US Stocks</h2>
            <p>NASDAQ, AAPL</p>
            <p class="negative">-1.23%</p>
        </div>

        <div class="card">
            <div class="icon">💱</div>
            <h2>Forex</h2>
            <p>EUR/USD</p>
            <p class="positive">+0.34%</p>
        </div>

        <div class="card">
            <div class="icon">🛢️</div>
            <h2>Oil</h2>
            <p>Crude Oil</p>
            <p class="negative">-0.76%</p>
        </div>

        <div class="card">
            <div class="icon">🏆</div>
            <h2>Gold</h2>
            <p>Gold Futures</p>
            <p class="positive">+1.12%</p>
        </div>

    </div>
</div>

</body>
</html>
